<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Certificate</title>
  <link rel="stylesheet" href="/manager/static/css/branding.css">
  <style>
    body {
      background: var(--brand-primary);
      background: linear-gradient(135deg, var(--brand-primary) 0%, #1a0804 100%);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text-primary);
      overflow: hidden;
    }

    .container {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      text-align: center;
      width: 380px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-top: 10px;
      margin-bottom: 25px;
      color: var(--brand-tertiary);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .info-group {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 25px;
      text-align: left;
    }

    .info-group p {
      margin: 5px 0;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .info-group b {
      color: var(--text-primary);
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--brand-tertiary);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
    }

    #passwordError {
      color: var(--error);
      font-size: 0.85rem;
      margin: 5px 0 15px;
      display: block;
      font-weight: 600;
    }

    .note {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin: 15px 0 25px;
      line-height: 1.4;
      font-style: italic;
    }

    button {
      background: var(--brand-tertiary);
      color: var(--brand-primary);
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      width: 100%;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="margin-bottom: 20px;">
        <image src="/services-static/img/mascot-welcome.svg" height="64" width="64" />
    </div>
    <h2>Client Certificate</h2>
    
    <div class="info-group">
        <p><b>Server:</b> {{ fqdn }}</p>
        <p><b>User:</b> {{ user }}</p>
        <p><b>Validity:</b> {{ days }} days</p>
    </div>

    <form action="/services/mtls" method="POST" id="certForm">
      <input type="hidden" name="token" value="{{ token }}">
      <input type="email" id="email" name="email" placeholder="Email" required />
      <input type="password" id="password" name="password" placeholder="Password" required />
      <input type="password" id="password_confirm" name="password_confirm" placeholder="Confirm password" required />
      <span id="passwordError"></span>
      <p class="note">Please note: You will need this password when importing the client certificate into your web browser.</p>
      <button type="submit">Download</button>
    </form>
  </div>

  <script>
    document.getElementById('certForm').addEventListener('submit', function(event) {
      const pwd = document.getElementById('password').value;
      const pwdConfirm = document.getElementById('password_confirm').value;
      const errorElem = document.getElementById('passwordError');
      if (pwd !== pwdConfirm) {
        event.preventDefault();
        errorElem.textContent = 'Passwords do not match.';
      } else {
        errorElem.textContent = '';
      }
    });
  </script>
</body>
</html>

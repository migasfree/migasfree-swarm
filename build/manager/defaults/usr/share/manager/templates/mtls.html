<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Certificate</title>
  <link rel="stylesheet" href="/manager/static/css/branding.css">
  <style>
    body {
      background: var(--bg-body);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text-main);
      overflow: hidden;
      font-family: var(--font-ui);
    }

    .container {
      width: 420px;
      padding: 3rem;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      color: var(--brand-primary);
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .info-group {
      background: rgba(var(--brand-primary-rgb), 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .info-group p {
      margin: 0.5rem 0;
      font-size: 0.95rem;
      color: var(--brand-secondary);
    }

    .info-group b {
      color: var(--brand-primary);
    }

    .actions {
        margin-top: 2rem;
    }

    .mascot-container {
        margin-bottom: 20px;
    }

    .note {
      font-size: 0.8rem;
      color: var(--brand-secondary);
      margin: 1.5rem 0;
      line-height: 1.4;
      font-style: italic;
    }

    #passwordError {
      color: var(--error);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: block;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container panel">
    <div class="mascot-container">
        <image src="/manager/static/img/mtls.svg" height="80" width="80" />
    </div>

    <h2>Client Certificate</h2>
    
    <div class="info-group">
      <p><b>User:</b> {{ user_id }}</p>
      <p><b>Manager:</b> {{ server_host }}</p>
    </div>

    <form action="/manager/v1/public/mtls/certificates" method="POST" id="certForm">
      <input type="hidden" name="token" value="{{ token }}">
      <input type="email" id="email" name="email" class="input-text" placeholder="Email (optional)" />
      <input type="password" id="password" name="password" class="input-text" placeholder="Certificate Password (optional)" />
      <input type="password" id="password_confirm" name="password_confirm" class="input-text" placeholder="Confirm password" />
      
      <div class="actions">
        <span id="passwordError" class="hidden"></span>
        <p class="note">Please note: You will need this password when importing the certificate in your browser or migasfree-play.</p>
        <button type="submit" class="btn-action full-width">
            <span class="mdi mdi-download"></span>
            Download
        </button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('certForm').addEventListener('submit', function(event) {
      const pwd = document.getElementById('password').value;
      const pwdConfirm = document.getElementById('password_confirm').value;
      const errorElem = document.getElementById('passwordError');
      if (pwd !== pwdConfirm) {
        event.preventDefault();
        errorElem.textContent = 'Passwords do not match.';
        errorElem.classList.remove('hidden');
      } else {
        errorElem.textContent = '';
        errorElem.classList.add('hidden');
      }
    });
  </script>
</body>
</html>

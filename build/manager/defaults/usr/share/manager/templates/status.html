<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width" />
  <title>Status</title>
  <link rel="stylesheet" href="/manager/static/css/branding.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      font-family: var(--font-ui);
      color: var(--brand-primary);
      background: var(--bg-body);
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--rounded-glass);
      box-shadow: 0 8px 32px 0 rgba(67, 20, 7, 0.1);
      transition: var(--transition-physics);
    }

    .info-content {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }

    .services-section {
      margin-bottom: 20px;
      display: flex;
      gap: 2rem;
      align-items: center;
      justify-content: center;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      flex: 1;
    }

    .service-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.25rem;
      width: 220px;
      aspect-ratio: 1 / 1;
      justify-self: center;
      border-radius: 50%;
      background: rgba(var(--brand-primary-rgb), 0.03);
      border: 1px solid transparent;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      position: relative;
    }

    .service-card:hover {
      background: rgba(var(--brand-primary-rgb), 0.06);
      border-color: var(--glass-border);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(var(--brand-primary-rgb), 0.08);
    }

    .service-icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 0.25rem;
    }

    .service-card:hover .service-icon-wrap {
      transform: scale(1.12);
    }

    .service-icon-wrap img {
      width: 80px;
      height: 80px;
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }

    .service-card:hover .service-icon-wrap img {
      opacity: 1;
    }

    .service-footer {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .service-indicator {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: lightgray;
      display: none;
      transition: background-color 0.3s ease;
      flex-shrink: 0;
    }

    .service-count {
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--brand-secondary);
      min-width: 0;
    }

    .service-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--brand-secondary);
      letter-spacing: 0.02em;
    }

    .service-link {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: none;
      z-index: 1;
      cursor: pointer;
    }

    .status-dot {
      width: 16px;
      height: 16px;
      background-color: #10b981;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-right: 0.4rem;
    }

    .tabs-nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      background: var(--glass-bg);
      padding: 0.6rem;
      border-radius: 1.25rem;
      border: 1px solid var(--glass-border);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--shadow);
    }

    .tab-btn {
      padding: 0.75rem 1.75rem;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--link-color);
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.85rem;
    }

    .tab-btn:hover {
      background: var(--link-hover-bg);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(67, 20, 7, 0.1);
      border-color: var(--brand-tertiary);
    }

    .tab-btn.active {
      background: var(--brand-primary);
      color: white;
      border-color: var(--brand-primary);
      box-shadow: 0 8px 20px rgba(67, 20, 7, 0.25);
      transform: translateY(-2px);
    }

    .tab-btn .mdi {
      font-size: 1.25rem;
      opacity: 0.9;
    }

    .tab-btn.active .mdi {
      color: var(--brand-tertiary);
      opacity: 1;
    }

    @media (max-width: 1200px) {
      .services-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 992px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .info-panel {
        flex-direction: column;
        align-items: stretch;
      }
      .info-content {
        justify-content: center;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .info-content {
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      .services-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <script>
    (function () {
      'use strict';

      // Configuration
      const CONFIG = {
        infoEndpoint: '/manager/v1/private/info',
        streamEndpoint: '/manager/v1/private/stream',
        reconnectDelay: 5000,
        waitingThreshold: 5000,
        serviceList: [
          'portainer', 'proxy', 'manager',
          'console', 'public', 'pms',
          'beat', 'core', 'worker',
          'database', 'datastore', 'datashare_console',
          'certbot', 'mcp-server', 'tunnel'
        ],
        consoleServices: [
          'portainer', 'proxy', 'manager',
          'console',
          'core', 'worker',
          'database', 'datastore', 'datashare_console',
          'tunnel'
        ],
        infoData: null,
      };

      const state = {
        eventSource: null,
        lastUpdate: Date.now(),
        serviceStates: {},
        pmsServices: {},
        waiting: true,
        wasDisconnected: false,
        allHealthy: false
      };

      // DOM Cache
      const dom = {
        nodes: {},
        links: {},
        nodeTexts: {},
        organization: null,
        stack: null,
        tag: null
      };

      // Initialize DOM cache
      function cacheDOMElements() {
        dom.organization = document.getElementById('organization');
        dom.stack = document.getElementById('stack');
        dom.tag = document.getElementById('tag');

        // Cache all service nodes
        CONFIG.serviceList.forEach(elementId => {
          dom.nodes[elementId] = document.getElementById(elementId);
          dom.nodeTexts[elementId] = document.getElementById(`nodes_${elementId}`);
        });

        if (dom.nodes.pms) {
          dom.pmsCard = dom.nodes.pms.closest('.service-card');
        }

        // Cache console links
        CONFIG.consoleServices.forEach(service => {
          const linkParent = document.getElementById(`${service}_link_parent`);
          const link = document.getElementById(`${service}_link`);
          if (linkParent) dom.links[service] = linkParent;
          else if (link) dom.links[service] = link;
        });

        // Special case for public link
        const publicLink = document.getElementById('public_link');
        if (publicLink) dom.links.public = publicLink;
      }

      async function fetchInfo() {
        try {
          const response = await fetch(CONFIG.infoEndpoint);
          if (!response.ok) throw new Error('Error getting /manager/info');
          const info = await response.json();
          CONFIG.infoData = info;
          dom.organization.textContent = info.organization || '';
          dom.stack.textContent = info.stack || '';
          dom.tag.textContent = info.tag || '';
          return info;
        } catch (error) {
          console.error('Failed to load info:', error);
          return null;
        }
      }

      function setupLinks() {
        const host = window.location.host;
        const links = {
          portainer_link_parent: `https://portainer-${host}`,
          proxy_link_parent: `https://${host}/stats`,
          manager_link_parent: `https://${host}/manager/docs`,
          console_link_parent: `https://${host}/`,
          core_link_parent: `https://${host}/docs/`,
          worker_link_parent: `https://worker-${host}/tasks`,
          database_link_parent: `https://database-${host}`,
          datastore_link_parent: `https://datastore-${host}`,
          datashare_console_link_parent: `https://datashare-${host}`,
          tunnel_link_parent: `https://${host}/manager/v1/private/tunnel/console`,
        };

        Object.entries(links).forEach(([id, href]) => {
          const el = document.getElementById(id);
          if (el) el.setAttribute('href', href);
        });

        // Public link special handling
        const publicLink = document.getElementById('public_link');
        if (publicLink) {
          publicLink.style.cursor = 'pointer';
          publicLink.addEventListener('click', () => {
            window.open(`https://${host}/public/`, '_blank');
          });
        }
      }

      function getServiceName(fullName) {
        if (!CONFIG.infoData) return fullName;
        const stack = CONFIG.infoData.stack;

        if (fullName.startsWith('infra_')) {
          return fullName.replace('infra_', '');
        }

        if (fullName.startsWith(`${stack}_`)) {
          return fullName.replace(`${stack}_`, '');
        }

        return fullName;
      }

      function getColorFromStatus(status) {
        const colorMap = {
          'healthy': '#10b981',   // branding success
          'degraded': '#a16207',  // branding warning
          'starting': '#feda00',  // branding tertiary (yellow)
          'down': '#dc2626',      // branding error
          'unknown': '#c4b5b0'    // branding neutral-400
        };
        return colorMap[status] || 'lightgray';
      }

      function updateServiceNode(serviceName, statusInfo) {
        const node = dom.nodes[serviceName];
        if (!node) {
          console.warn(`Node not found for service: ${serviceName}`);
          return;
        }

        console.debug(`${serviceName} statusInfo:`, statusInfo);

        const isDisabled = CONFIG.infoData?.disabled?.includes(serviceName);

        let color;
        if (isDisabled) {
          color = 'lightgray';
        } else {
          color = getColorFromStatus(statusInfo.status);
        }
        console.debug(`${serviceName} color: ${color}`)

        node.style.backgroundColor = color;
        node.style.display = 'block';

        // Updates nodes if > 1
        if (dom.nodeTexts[serviceName]) {
          console.debug('nodeText:', dom.nodeTexts[serviceName]);
          const nodeCount = statusInfo.running || 0;
          dom.nodeTexts[serviceName].textContent = nodeCount > 1 ? `(${nodeCount})` : '';
        }

        // Updates console link visibility
        const link = dom.links[serviceName];
        if (link) {
          const shouldShow = statusInfo.running > 0 && !isDisabled;
          console.debug(`${serviceName} shouldShow: ${shouldShow}`)
          link.style.display = shouldShow ? 'block' : 'none';
          console.debug('dom.link:', link);
        }

        state.serviceStates[serviceName] = statusInfo;
      }

      function updatePMSNode() {
        const node = dom.nodes.pms;
        if (!node) return;

        const pmsServiceNames = Object.keys(state.pmsServices);
        if (pmsServiceNames.length === 0) {
          node.style.display = 'none';
          return;
        }

        let totalRunning = 0;
        let totalDesired = 0;
        let anyDown = false;
        let anyDegraded = false;
        let healthyList = [];
        let issueList = [];

        pmsServiceNames.forEach(name => {
          const status = state.pmsServices[name];
          const running = status.running || 0;
          const desired = status.desired || 0;
          totalRunning += running;
          totalDesired += desired;

          const summary = `${name} (${running}/${desired})`;
          if (status.status === 'healthy') {
            healthyList.push(summary);
          } else {
            issueList.push(`${summary} - ${status.status}`);
            if (status.status === 'down') anyDown = true;
            if (status.status === 'degraded') anyDegraded = true;
          }
        });

        // Tooltip construction
        let tooltip = '';
        if (issueList.length > 0) {
          tooltip += 'ISSUES:\n' + issueList.join('\n') + '\n\n';
        }
        if (healthyList.length > 0) {
          tooltip += 'HEALTHY:\n' + healthyList.join('\n');
        }
        if (dom.pmsCard) dom.pmsCard.title = tooltip.trim();

        let color = getColorFromStatus('healthy');
        if (anyDown) color = getColorFromStatus('down');
        else if (anyDegraded) color = getColorFromStatus('degraded');
        else if (totalRunning < totalDesired) color = getColorFromStatus('starting');

        node.style.backgroundColor = color;
        node.style.display = 'block';

        if (dom.nodeTexts.pms) {
          dom.nodeTexts.pms.textContent = totalRunning > 0 ? `(${totalRunning})` : '';
        }
      }

      function updateStatusDot() {
        const services = [
          ...Object.values(state.serviceStates),
          ...Object.values(state.pmsServices)
        ];
        const total = services.length;
        const downCount = services.filter(s => s.status === 'down').length;
        const healthyCount = services.filter(s => s.status === 'healthy').length;

        const allHealthy = healthyCount === total && total > 0;

        const dotEl = document.getElementById('status-dot');
        if (dotEl) {
          if (total === 0 || downCount === total) {
            dotEl.style.backgroundColor = '#dc2626';
            dotEl.style.boxShadow = '0 0 8px rgba(220, 38, 38, 0.6)';
          } else if (allHealthy) {
            dotEl.style.backgroundColor = '#10b981';
            dotEl.style.boxShadow = '0 0 8px rgba(16, 185, 129, 0.6)';
          } else {
            dotEl.style.backgroundColor = '#eab308';
            dotEl.style.boxShadow = '0 0 10px rgba(234, 179, 8, 0.8)';
          }
        }
      }

      function handleStatusSSEMessage(event) {
        try {
          state.waiting = false;
          state.lastUpdate = Date.now();

          console.debug('event.data', event.data);
          const data = JSON.parse(event.data);
          console.debug('Status SSE event received:', data);

          if (!data.service || !data.status) {
            console.warn('Invalid Status SSE data:', data);
            return;
          }

          const fullServiceName = data.service;
          const serviceName = getServiceName(fullServiceName);
          console.debug('handleStatusSSEMessage', serviceName, data.status);

          if (serviceName.startsWith('pms-')) {
            state.pmsServices[serviceName] = data.status;
            updatePMSNode();
          } else {
            updateServiceNode(serviceName, data.status);
          }

          updateStatusDot();
          state.wasDisconnected = false;
        } catch (error) {
          console.error('Status SSE parse error:', error);
        }
      }

      function initSSE() {
        if (state.eventSource) {
          state.eventSource.close();
        }

        state.waiting = true;
        state.eventSource = new EventSource(CONFIG.streamEndpoint);

        state.eventSource.addEventListener('status', handleStatusSSEMessage);

        state.eventSource.addEventListener('ping', () => {
          console.debug('SSE ping received');
          state.lastUpdate = Date.now();
        });

        state.eventSource.onerror = () => {
          console.warn('SSE connection lost, reconnecting...');
          state.eventSource.close();
          showDisconnected();
          state.wasDisconnected = true;
          setTimeout(initSSE, CONFIG.reconnectDelay);
        };

        state.eventSource.onopen = () => {
          console.debug('SSE connected');
          state.wasDisconnected = false;
        };
      }

      function showWaiting() {
        // No-op to prevent status dot from turning red due to simple inactivity
      }

      function showDisconnected() {
        Object.values(dom.nodes).forEach(node => {
          if (node) node.style.display = 'none';
        });

        Object.values(dom.links).forEach(link => {
          if (link) link.style.display = 'none';
        });

        const dotEl = document.getElementById('status-dot');
        if (dotEl) {
          dotEl.style.backgroundColor = '#dc2626';
          dotEl.style.boxShadow = '0 0 8px rgba(220, 38, 38, 0.6)';
        }
      }

      function checkConnection() {
        if (!state.eventSource || state.eventSource.readyState !== 1) {
          showDisconnected();
          return;
        }
        updateStatusDot();
      }

      function showWelcome() {
        Object.values(dom.nodes).forEach(node => {
          if (node) {
            node.style.backgroundColor = 'lightgray';
            node.style.display = 'none';
          }
        });

        Object.values(dom.links).forEach(link => {
          if (link) link.style.display = 'none';
        });
      }

      // Initialize
      async function init() {
        cacheDOMElements();
        setupLinks();
        showWelcome();

        CONFIG.infoData = await fetchInfo();

        if (CONFIG.infoData) {
          initSSE();
        }

        setInterval(checkConnection, 2000);
      }

      // Cleanup on unload
      window.addEventListener('beforeunload', () => {
        if (state.eventSource) {
          state.eventSource.close();
        }
      });

      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>

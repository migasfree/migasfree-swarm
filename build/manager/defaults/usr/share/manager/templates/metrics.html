<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics Dashboard</title>
    <script src="/manager/static/js/chart.min.js"></script>
    <script src="/manager/static/js/dayjs.min.js"></script>
    <script src="/manager/static/js/chartjs-adapter-dayjs.min.js"></script>
    <link rel="stylesheet" href="/manager/static/css/branding.css">
    <style>
        body {
            font-family: var(--font-ui);
            margin: 0;
            padding: 0;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* Tabs Navigation */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            background: var(--glass-bg);
            padding: 0.6rem;
            border-radius: 1.25rem;
            border: 1px solid var(--glass-border);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow);
        }

        .tab-btn {
            padding: 0.75rem 1.75rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--link-color);
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
        }

        .tab-btn:hover {
            background: var(--link-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 20, 7, 0.1);
            border-color: var(--brand-tertiary);
        }

        .tab-btn.active {
            background: var(--brand-primary);
            color: white;
            border-color: var(--brand-primary);
            box-shadow: 0 8px 20px rgba(67, 20, 7, 0.25);
            transform: translateY(-2px);
        }

        .tab-btn .mdi {
            font-size: 1.25rem;
            opacity: 0.9;
        }

        .tab-btn.active .mdi {
            color: var(--brand-tertiary);
            opacity: 1;
        }

        .tab-content {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Metrics Grid */
        .metrics-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .metric-card {
            text-align: center;
        }

        .metric-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--brand-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--brand-primary);
            font-family: var(--font-code);
        }

        /* Charts */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .status-label {
            font-size: 1.1em;
        }

        .cpu-text {
            font-weight: 700;
        }

        .cpu-highlight-danger { color: var(--danger); }
        .cpu-highlight-warn { color: orange; }

        .chart-container-inner {
            height: 450px;
            position: relative;
        }

        @media (min-width: 1024px) {
            .chart-grid {
                grid-template-columns: 1fr 1fr;
            }

            .chart-full {
                grid-column: span 2;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="page-header">
            <h1 class="page-title">Metrics Dashboard</h1>
        </header>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('sync')">
                <span class="mdi mdi-sync"></span> Synchronizations
            </button>
            <button class="tab-btn" onclick="switchTab('db')">
                <span class="mdi mdi-database"></span> Database Cluster
            </button>
        </nav>

        <!-- Tab: Synchronizations -->
        <div id="tab-sync" class="tab-content active">
            <div class="metrics-summary">
                <div class="metric-card panel">
                    <div class="metric-label">Server Status</div>
                    <div class="metric-value" id="current-status">-</div>
                </div>
                <div class="metric-card panel">
                    <div class="metric-label">Core CPU Avg</div>
                    <div class="metric-value" id="current-cpu">-</div>
                </div>
                <div class="metric-card panel">
                    <div class="metric-label">Sampling Int.</div>
                    <div class="metric-value" id="limit-recording">-</div>
                </div>
            </div>

            <div class="chart-grid">
                <div class="chart-container panel chart-full">
                    <div class="chart-container-inner">
                        <canvas id="attemptsChart"></canvas>
                    </div>
                </div>
                <div class="chart-container panel chart-full">
                    <div class="chart-container-inner">
                        <canvas id="cpuChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Database Cluster -->
        <div id="tab-db" class="tab-content">
            <div class="metrics-summary">
                <div class="metric-card panel">
                    <div class="metric-label">Gateway Latency</div>
                    <div class="metric-value" id="current-db">-</div>
                </div>
                <div class="metric-card panel">
                    <div class="metric-label">DB CPU AVG</div>
                    <div class="metric-value" id="current-db-cpu">-</div>
                </div>
                <div class="metric-card panel">
                    <div class="metric-label">Cluster Nodes</div>
                    <div class="metric-value" id="node-count">-</div>
                </div>
            </div>

            <div id="cluster-section" class="table-container panel hidden">
                <h2>⛁ Cluster Status (Pgpool-II)</h2>
                <table class="data-table" id="nodes-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Host</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>CPU</th>
                            <th>Replic. Lag</th>
                            <th>Reads (QPM)</th>
                            <th>Writes (WPM)</th>
                            <th>DB Errors (EPM)</th>
                        </tr>
                    </thead>
                    <tbody id="nodes-tbody">
                    </tbody>
                </table>
            </div>

            <div class="chart-grid">
                <div class="chart-container panel">
                    <div class="chart-container-inner">
                        <canvas id="dbChart"></canvas>
                    </div>
                </div>
                <div class="chart-container panel">
                    <div class="chart-container-inner">
                        <canvas id="dbCpuChart"></canvas>
                    </div>
                </div>
                <div id="clusterChartContainer" class="chart-container panel chart-full hidden">
                    <div class="chart-container-inner">
                        <canvas id="clusterChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>





    <script>
        // Chart.js Global Settings
        Chart.defaults.color = 'rgba(67, 20, 7, 0.6)';
        Chart.defaults.font.family = 'var(--font-ui)';
        Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(67, 20, 7, 0.9)';
        Chart.defaults.plugins.tooltip.titleColor = '#ffffff';
        Chart.defaults.plugins.tooltip.bodyColor = '#ffffff';
        Chart.defaults.plugins.tooltip.borderColor = 'rgba(255, 255, 255, 0.1)';
        Chart.defaults.plugins.tooltip.borderWidth = 1;

        function switchTab(tabId) {
            // Update Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Update Content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');

            // Resize charts to fix canvas issues in hidden containers
            window.dispatchEvent(new Event('resize'));
        }

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'time',
                    grid: { color: 'rgba(67, 20, 7, 0.05)' },
                    time: {
                        unit: 'minute',
                        displayFormats: {
                            minute: 'HH:mm'
                        },
                        tooltipFormat: 'HH:mm:ss',
                    },
                    title: {
                        display: true,
                        text: 'Time'
                    }
                },
                y: {
                    grid: { color: 'rgba(67, 20, 7, 0.05)' },
                },
                ySaturation: {
                    type: 'linear',
                    display: false,
                    position: 'right',
                    min: 0,
                    max: 1,
                    beginAtZero: true
                }
            },
            interaction: {
                mode: 'index',
                intersect: false,
            },
            animation: false,
            plugins: {
                legend: {
                    labels: {
                        filter: function (item, chart) {
                            // Hide 'Saturated' from legend
                            return item.text !== 'Saturated';
                        }
                    }
                }
            }
        };

        const saturationDataset = {
            label: 'Saturated',
            data: [],
            yAxisID: 'ySaturation',
            backgroundColor: 'rgba(220, 38, 38, 0.05)',
            fill: true,
            borderColor: 'transparent',
            pointRadius: 0,
            stepped: true
        };

        // Attempts Chart
        const ctxAttempts = document.getElementById('attemptsChart').getContext('2d');
        let attemptsChart = new Chart(ctxAttempts, {
            type: 'bar',
            data: {
                datasets: [
                    { ...saturationDataset, type: 'line' },
                    {
                        label: 'Sync Attempts',
                        backgroundColor: [],
                        data: [],
                        yAxisID: 'y',
                        borderRadius: 4
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Attempts'
                        }
                    }
                },
                plugins: {
                    ...commonOptions.plugins,
                    title: {
                        display: true,
                        text: 'Synchronization Attempts',
                        color: '#431407',
                        font: { size: 16, weight: 'bold' }
                    }
                }
            }
        });

        // CPU Chart
        const ctxCPU = document.getElementById('cpuChart').getContext('2d');
        let cpuChart = new Chart(ctxCPU, {
            type: 'line',
            data: {
                datasets: [
                    { ...saturationDataset },
                    {
                        label: 'Core CPU Load (%)',
                        borderColor: '#854d0e',
                        backgroundColor: 'rgba(133, 77, 14, 0.1)',
                        fill: true,
                        data: [],
                        yAxisID: 'y',
                        tension: 0.3
                    }, {
                        label: 'Limit',
                        borderColor: 'rgba(220, 38, 38, 0.6)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        data: [],
                        yAxisID: 'y'
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        beginAtZero: true,
                        max: 200,
                        title: {
                            display: true,
                            text: 'Core CPU (%)'
                        }
                    }
                },
                plugins: {
                    ...commonOptions.plugins,
                    title: {
                        display: true,
                        text: 'Core CPU Load',
                        color: '#431407',
                        font: { size: 16, weight: 'bold' }
                    }
                }
            }
        });

        // DB Chart
        const ctxDB = document.getElementById('dbChart').getContext('2d');
        let dbChart = new Chart(ctxDB, {
            type: 'line',
            data: {
                datasets: [
                    { ...saturationDataset },
                    {
                        label: 'DB Latency (s)',
                        borderColor: '#059669',
                        backgroundColor: 'rgba(5, 150, 105, 0.1)',
                        fill: true,
                        data: [],
                        yAxisID: 'y',
                        tension: 0.3
                    }, {
                        label: 'Limit',
                        borderColor: 'rgba(220, 38, 38, 0.6)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        data: [],
                        yAxisID: 'y'
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        beginAtZero: true,
                        max: 1,
                        title: {
                            display: true,
                            text: 'Latency (s)'
                        }
                    }
                },
                plugins: {
                    ...commonOptions.plugins,
                    title: {
                        display: true,
                        text: 'Gateway Latency',
                        color: '#059669',
                        font: { size: 16, weight: 'bold' }
                    }
                }
            }
        });

        // DB CPU Chart
        const ctxDBCpu = document.getElementById('dbCpuChart').getContext('2d');
        let dbCpuChart = new Chart(ctxDBCpu, {
            type: 'line',
            data: {
                datasets: [
                    { ...saturationDataset },
                    {
                        label: 'DB CPU (%)',
                        borderColor: '#7c3aed',
                        backgroundColor: 'rgba(124, 58, 237, 0.1)',
                        fill: true,
                        data: [],
                        yAxisID: 'y',
                        tension: 0.3
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        beginAtZero: true,
                        max: 200,
                        title: {
                            display: true,
                            text: 'DB CPU (%)'
                        }
                    }
                },
                plugins: {
                    ...commonOptions.plugins,
                    title: {
                        display: true,
                        text: 'Database CPU Load',
                        color: '#7c3aed',
                        font: { size: 16, weight: 'bold' }
                    }
                }
            }
        });

        // Cluster Load Balance Chart
        const ctxCluster = document.getElementById('clusterChart').getContext('2d');
        let clusterChart = new Chart(ctxCluster, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Reads (QPM)',
                        backgroundColor: 'rgba(16, 185, 129, 0.6)',
                        borderColor: 'rgb(16, 185, 129)',
                        borderWidth: 1,
                        data: []
                    },
                    {
                        label: 'Writes (WPM)',
                        backgroundColor: 'rgba(79, 70, 229, 0.6)',
                        borderColor: 'rgb(79, 70, 229)',
                        borderWidth: 1,
                        data: []
                    },
                    {
                        label: 'Errors (EPM)',
                        backgroundColor: 'rgba(239, 68, 68, 0.6)',
                        borderColor: 'rgb(239, 68, 68)',
                        borderWidth: 1,
                        data: []
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Load Balancing (Select Distribution)'
                    }
                },
                scales: {
                    x: {
                        stacked: true,
                    },
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        title: { display: true, text: 'Operations Per Minute' }
                    }
                }
            }
        });

        async function fetchData() {
            try {
                const response = await fetch("{{ request.url_for('metrics_json').path }}");
                const data = await response.json();

                // Parse history
                const history = data.history.sort((a, b) => a.ts - b.ts);

                const dbData = history.map(item => ({ x: item.ts * 1000, y: item.db_latency !== undefined ? item.db_latency : item.db }));
                const cpuData = history.map(item => ({ x: item.ts * 1000, y: item.core_cpu !== undefined ? item.core_cpu : item.cpu }));
                const dbCpuData = history.map(item => ({ x: item.ts * 1000, y: item.db_cpu || 0 }));
                const attemptsData = history.map(item => ({ x: item.ts * 1000, y: item.attempts }));

                // Saturation Background Data (0 or 1)
                const saturationData = history.map(item => ({ x: item.ts * 1000, y: item.saturated }));

                // Limits
                const dbLimit = data.limits ? data.limits.db_latency : 0;
                const cpuLimit = data.limits ? data.limits.core_cpu : 0;

                const dbLimitData = history.map(item => ({ x: item.ts * 1000, y: dbLimit }));
                const cpuLimitData = history.map(item => ({ x: item.ts * 1000, y: cpuLimit }));

                // Point Styling
                const dbPointColors = history.map(item => (item.db_latency || item.db) > dbLimit ? '#dc2626' : '#10b981');
                const cpuPointColors = history.map(item => (item.core_cpu || item.cpu) > cpuLimit ? '#dc2626' : '#854d0e');
                const attemptsColors = history.map(item => item.saturated === 1 ? 'rgba(220, 38, 38, 0.8)' : 'rgba(67, 20, 7, 0.8)');

                // Update Attempts Chart
                attemptsChart.data.datasets[0].data = saturationData; // Background
                attemptsChart.data.datasets[1].data = attemptsData;
                attemptsChart.data.datasets[1].backgroundColor = attemptsColors;
                attemptsChart.update();

                // Update CPU Chart
                cpuChart.data.datasets[0].data = saturationData;
                cpuChart.data.datasets[1].data = cpuData;
                cpuChart.data.datasets[1].pointBackgroundColor = cpuPointColors;
                cpuChart.data.datasets[1].pointBorderColor = cpuPointColors;
                cpuChart.data.datasets[1].pointRadius = history.map(item => (item.core_cpu || item.cpu) > cpuLimit ? 5 : 2);
                cpuChart.data.datasets[2].data = cpuLimitData;
                cpuChart.update();

                // Update DB Chart
                dbChart.data.datasets[0].data = saturationData;
                dbChart.data.datasets[1].data = dbData;
                dbChart.data.datasets[1].pointBackgroundColor = dbPointColors;
                dbChart.data.datasets[1].pointBorderColor = dbPointColors;
                dbChart.data.datasets[1].pointRadius = history.map(item => (item.db_latency || item.db) > dbLimit ? 5 : 2);
                dbChart.data.datasets[2].data = dbLimitData;
                dbChart.update();

                // Update DB CPU Chart
                dbCpuChart.data.datasets[0].data = saturationData;
                dbCpuChart.data.datasets[1].data = dbCpuData;
                dbCpuChart.data.datasets[1].pointRadius = 2;
                dbCpuChart.update();

                // Update Current Cards
                if (data.current) {
                    const curDb = data.current.db_latency !== undefined ? data.current.db_latency : data.current.db;
                    const curCpu = data.current.core_cpu !== undefined ? data.current.core_cpu : data.current.cpu;

                    document.getElementById('current-db').innerText = (curDb || 0).toFixed(3) + ' s';
                    document.getElementById('current-cpu').innerText = (curCpu || 0).toFixed(1) + ' %';
                    document.getElementById('current-db-cpu').innerText = (data.current.db_cpu || 0).toFixed(1) + ' %';

                    const statusEl = document.getElementById('current-status');
                    statusEl.innerText = data.current.saturated ? "SATURATED" : "HEALTHY";
                    statusEl.style.color = data.current.saturated ? "#dc2626" : "#10b981";

                    // Highlight values if saturated
                    if (curDb > dbLimit) document.getElementById('current-db').style.color = "#dc2626";
                    else document.getElementById('current-db').style.color = "#431407";

                    if (curCpu > cpuLimit) document.getElementById('current-cpu').style.color = "#dc2626";
                    else document.getElementById('current-cpu').style.color = "#431407";

                    // Update Cluster Table & Chart
                    const nodes = data.current.cluster_nodes || [];
                    document.getElementById('node-count').innerText = nodes.length;

                    if (nodes.length > 0) {
                        document.getElementById('cluster-section').style.display = 'block';
                        document.getElementById('clusterChartContainer').style.display = 'block';

                        const tbody = document.getElementById('nodes-tbody');
                        tbody.innerHTML = '';

                        const labels = [];
                        const reads = [];
                        const writes = [];
                        const errors = [];

                        nodes.forEach(node => {
                            const tr = document.createElement('tr');

                            // More robust status detection (handles numbers 3=DOWN or strings "down")
                            const isDown = node.status === 3 ||
                                (typeof node.status === 'string' && node.status.toLowerCase().includes('down'));

                            const statusBadge = isDown ? '<span class="badge badge-danger">Offline</span>' : '<span class="badge badge-success">Online</span>';
                            const roleLabel = node.role.toUpperCase();
                            const isPrimary = node.role.toLowerCase() === 'primary';

                            const formatBytes = (bytes) => {
                                if (isPrimary) return '-';

                                const val = bytes || 0;
                                const lagInMB = val / (1024 * 1024);

                                if (node.status === 0) {
                                    return '<span title="Sync OK" class="status-label">✅</span>';
                                }

                                const k = 1024;
                                const sizes = ['B', 'KB', 'MB', 'GB'];
                                const i = Math.floor(Math.log(val) / Math.log(k));
                                const formattedValue = parseFloat((val / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];

                                if (lagInMB <= 50) {
                                    return `<span title="Warning: Increasing Replication Lag">⚠️</span> <strong>${formattedValue}</strong>`;
                                } else {
                                    return `<span title="Critical: High Replication Lag">🚨</span> <strong>${formattedValue}</strong>`;
                                }
                            };

                            const hasCpu = node.cpu_load !== null && node.cpu_load !== undefined;
                            const cpuValue = hasCpu ? (node.cpu_load).toFixed(1) + ' %' : '-';
                            const cpuClass = hasCpu && node.cpu_load > 80 ? 'cpu-highlight-danger' : (hasCpu && node.cpu_load > 50 ? 'cpu-highlight-warn' : '');

                            tr.innerHTML = `
                                <td>${node.id}</td>
                                <td>${node.host}</td>
                                <td class="role-${node.role}">${roleLabel}</td>
                                <td>${statusBadge}</td>
                                <td class="cpu-text ${cpuClass}"><strong>${cpuValue}</strong></td>
                                <td>${formatBytes(node.replication_delay)}</td>
                                <td><strong>${node.select_qpm.toFixed(1)}</strong> <small>qpm</small></td>
                                <td>
                                    <strong>${node.write_wpm.toFixed(1)}</strong> <small>wpm</small>
                                </td>
                                <td class="${node.error_epm > 0 ? 'status-down' : ''}"><strong>${node.error_epm.toFixed(1)}</strong> <small>epm</small></td>
                            `;
                            tbody.appendChild(tr);

                            labels.push(`Node ${node.id} (${node.role})`);
                            reads.push(node.select_qpm);
                            writes.push(node.write_wpm);
                            errors.push(node.error_epm);
                        });

                        clusterChart.data.labels = labels;
                        clusterChart.data.datasets[0].data = reads;
                        clusterChart.data.datasets[1].data = writes;
                        clusterChart.data.datasets[2].data = errors;
                        clusterChart.update();
                    } else {
                        document.getElementById('cluster-section').style.display = 'none';
                        document.getElementById('clusterChartContainer').style.display = 'none';
                    }
                }

                if (data.limits) { // Changed from data.limits && data.limits.recording_interval
                    document.getElementById('limit-recording').innerText = data.limits.recording_interval + ' s';
                }

            } catch (error) {
                console.error('Error fetching metrics:', error);
            }
        }

        // Initial Load
        fetchData();
        // Refresh every 10 seconds
        setInterval(fetchData, 10000);

    </script>
</body>

</html>

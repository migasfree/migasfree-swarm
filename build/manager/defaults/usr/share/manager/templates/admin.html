<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Migasfree Admin Certificate (mTLS)</title>
  <link rel="stylesheet" href="/manager/static/css/branding.css">

  <style>
    body {
      font-family: var(--font-ui);
      background-color: var(--bg-body);
      color: var(--brand-primary);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      width: 320px;
    }

    h2 {
      margin-bottom: 20px;
      color: var(--brand-primary);
      font-weight: 700;
    }

    h3 {
      margin-bottom: 20px;
      color: var(--brand-primary);
      font-weight: 600;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: var(--font-ui);
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 2px rgba(var(--brand-primary-rgb), 0.1);
    }

    #passwordError {
      color: var(--error);
      font-size: 0.85rem;
      margin: 8px 0;
      display: block;
    }

    button {
      background-color: var(--brand-primary);
      color: var(--brand-on-primary);
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 10px;
      width: 100%;
      transition: all 0.2s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <image src="{{root_path}}/static/img/mtls.svg" height="96" width="96" />
    <h2>Migasfree Admin Certificate (mTLS)</h2>
    <h3>Common Name: {{ common_name }}</h3>
    <p>DNS Name: {{ fqdn }}</p>
    <p>Validity: {{ validity_days }} days</p>

    <form action="{{root_path}}/v1/public/mtls/admin-certificates" method="POST" id="certForm">
      <input type="hidden" name="token" value="{{ token }}">
      <input type="email" id="email" name="email" placeholder="Email" required />
      <input type="password" id="password" name="password" placeholder="Password" required />
      <input type="password" id="password_confirm" name="password_confirm" placeholder="Confirm password" required />
      <span id="passwordError"></span>
      <p>Please note: You will need this password when importing the admin certificate into your web browser.<p>
      <button type="submit">Download</button>
    </form>
  </div>

  <script>
    document.getElementById('certForm').addEventListener('submit', function(event) {
      const pwd = document.getElementById('password').value;
      const pwdConfirm = document.getElementById('password_confirm').value;
      const errorElem = document.getElementById('passwordError');
      if (pwd !== pwdConfirm) {
        event.preventDefault();
        errorElem.textContent = 'Passwords do not match.';
      } else {
        errorElem.textContent = '';
      }
    });
  </script>
</body>
</html>

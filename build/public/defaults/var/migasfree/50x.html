    <meta charset="utf-8" />

    <style>
        @font-face {
            font-family: 'Dosis';
            font-weight: 400;
            font-style: normal;
            src: url('/manager/static/fonts/dosis-latin-400.woff2') format('woff2');
        }

        @font-face {
            font-family: 'Dosis';
            font-weight: 700;
            font-style: normal;
            src: url('/manager/static/fonts/dosis-latin-700.woff2') format('woff2');
        }

        :root {
            --brand-primary: #431407;
            --brand-primary-rgb: 67, 20, 7;
            --brand-secondary: #8c3b21;
            --brand-tertiary: #fbbf24;
            --brand-tertiary-rgb: 251, 191, 36;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(16px);
            --bg-body: #f8f6f5;
            --text-main: #2d2d2d;
            --font-ui: "Dosis", system-ui, -apple-system, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --brand-primary: #f8f6f5;
                --brand-primary-rgb: 248, 246, 245;
                --brand-secondary: #d4a373;
                --glass-bg: rgba(20, 20, 20, 0.6);
                --glass-border: rgba(255, 255, 255, 0.1);
                --bg-body: #121212;
                --text-main: #f0f0f0;
            }
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-ui);
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem 4rem;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .mascot-container {
            margin-bottom: 2rem;
            max-height: 150px;
        }

        .mascot-container svg {
            height: 150px;
            width: auto;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--brand-secondary), var(--brand-tertiary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height:  1;
            padding-bottom: 0.5rem;
        }

        .error-msg {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 2rem;
            color: var(--brand-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .action-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.75rem;
            border-radius: 10px;
            background: var(--brand-primary);
            color: var(--bg-body);
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
            transition: all 0.25s ease;
        }

        .action-link:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(var(--brand-primary-rgb), 0.2);
        }
    </style>
</head>

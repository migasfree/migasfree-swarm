<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="x-ua-compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="/static/fancyindex/styles.css" />
        <link rel="stylesheet" href="/manager/static/css/mdi.css" />
        <script type="text/javascript" src="/static/fancyindex/jquery.min.js"></script>
        <title>Migasfree Public Pool</title>
        <script type="text/javascript">
            $(document).ready(function() {
                const path = window.location.pathname;
                const footerEl = $('#footer-text');
                const isPublicRepo = path.includes('/public') || path.includes('/repo');

                if (isPublicRepo) {
                    document.title = 'Migasfree Public Repository';
                    footerEl.text('migasfree public files');
                    $('#btn-public').addClass('active');
                } else {
                    document.title = 'Migasfree Public Pool';
                    footerEl.text('migasfree pool files');
                    $('#btn-pool').addClass('active');
                }

                async function fetchInfo() {
                    try {
                        const response = await fetch('/manager/v1/private/info');
                        if (response.ok) {
                            const info = await response.json();
                            if (info.organization) {
                                $('#organization').text(info.organization).closest('.split-badge').show();
                            }
                            if (info.stack) {
                                $('#stack').text(info.stack).closest('.split-badge').show();
                            }
                            if (info.tag) {
                                $('#tag').text(info.tag).closest('.split-badge').show();
                            }
                        }
                    } catch (error) {
                        console.error('Failed to load info:', error);
                    }
                }

                fetchInfo();
            });
        </script>
    </head>
<body>
<div class="main-container">
    <div class="info-panel panel">
        <div class="info-content">
            <img class="info-logo" src="/static/fancyindex/logo.svg" alt="Migasfree" />
            <span class="split-badge" style="display: none;">
                <span class="badge-key">Organization</span>
                <span class="badge-value" id="organization"></span>
            </span>
            <span class="split-badge" style="display: none;">
                <span class="badge-key">Stack</span>
                <span class="badge-value" id="stack"></span>
            </span>
            <span class="split-badge" style="display: none;">
                <span class="badge-key">Tag</span>
                <span class="badge-value" id="tag"></span>
            </span>
        </div>
        <nav class="tabs-nav">
            <button id="btn-public" class="tab-btn" onclick="location.href='/public/'">
                <span class="mdi mdi-package-variant-closed"></span> Public
            </button>
            <button id="btn-pool" class="tab-btn" onclick="location.href='/pool/'">
                <span class="mdi mdi-folder"></span> Pool
            </button>
        </nav>
    </div>


    <div class="panel">
        <h1 class="hidden">Migasfree Public Pool</h1>

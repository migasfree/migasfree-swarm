<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="x-ua-compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="/static/fancyindex/styles.css" />
        <script type="text/javascript" src="/static/fancyindex/jquery.min.js"></script>
        <title>Migasfree Public Pool</title>
        <script type="text/javascript">
            $(document).ready(function() {
                const path = window.location.pathname;
                const titleEl = $('#page-title');
                const footerEl = $('#footer-text');
                if (path.includes('/public') || path.includes('/repo')) {
                    titleEl.text('migasfree public files');
                    document.title = 'Migasfree Public Repository';
                    footerEl.text('migasfree public files');
                } else {
                    titleEl.text('migasfree pool files');
                    document.title = 'Migasfree Public Pool';
                    footerEl.text('migasfree pool files');
                }
                titleEl.prepend('<img src="/static/fancyindex/logo.svg" alt="Migasfree Logo" style="height: 38px; width: auto; vertical-align: middle; margin-right: 15px; display: inline-block;" />');
            });
        </script>
    </head>
<body>
<div class="main-container">
    <div class="info-panel">
        <div class="info-content">
            <h1 class="panel-title" id="page-title">POOL</h1>
        </div>
    </div>

    <div class="panel">
        <h1 class="hidden">Migasfree Public Pool</h1>

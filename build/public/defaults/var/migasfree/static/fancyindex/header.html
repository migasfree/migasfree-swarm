<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="x-ua-compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="/static/fancyindex/styles.css" />
        <script type="text/javascript" src="/static/fancyindex/jquery.min.js"></script>
        <title>Migasfree Public Pool</title>
        <script type="text/javascript">
            $(document).ready(function() {
                $.ajax({
                    url: '/manager/v1/private/info',
                    type: 'GET',
                    success: function(info) {
                        $('#organization').text(info.organization || '');
                        $('#stack').text(info.stack || '');
                        $('#tag').text(info.tag || '');
                    },
                    error: function(err) {
                        console.error('Error fetching info:', err);
                    }
                });
            });
        </script>
    </head>
<body>
<div class="main-container">
    <div class="info-panel">
        <div class="info-content">
            <h1 class="panel-title">Pool</h1>
            <span class="split-badge">
                <span class="badge-key">Organization</span>
                <span class="badge-value" id="organization"></span>
            </span>
            <span class="split-badge">
                <span class="badge-key">Stack</span>
                <span class="badge-value" id="stack"></span>
            </span>
            <span class="split-badge">
                <span class="badge-key">Tag</span>
                <span class="badge-value" id="tag"></span>
            </span>
        </div>
        <div class="flex-row">
            <a id="status_emoji_link" href="/manager/v1/private/status" class="action-link" title="Status">
                Status
            </a>
            <a id="metrics_emoji_link" href="/manager/v1/private/metrics/dashboard" class="action-link" title="Metrics Dashboard">
                Metrics
            </a>
        </div>
    </div>

    <div class="panel">
        <h1 class="hidden">Migasfree Public Pool</h1>
